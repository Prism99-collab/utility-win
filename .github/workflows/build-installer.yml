name: Build Windows Installer

on:
  push:
    branches: [main]
    tags:
      - "v*"
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-msi:
    name: Build MSI
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Compile sources
        run: |
          python -m py_compile main.py ui.py indexer.py executor.py hotkey.py tray.py app_icon.py settings_store.py setup.py

      - name: Build MSI
        run: |
          python setup.py bdist_msi

      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: Utility-Win-MSI
          path: dist/*.msi
          if-no-files-found: error

      - name: Attach MSI to GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "${{ github.ref_name }}" `
            || gh release create "${{ github.ref_name }}" --title "Utility Win ${{ github.ref_name }}" --notes-file RELEASE_NOTES.md
          gh release upload "${{ github.ref_name }}" dist/*.msi --clobber
